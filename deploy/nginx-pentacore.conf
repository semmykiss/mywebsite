# Host nginx reverse proxy for the Pentacore Systems app (running in Docker on 127.0.0.1:3000).
#
# Install on the VM:
#   sudo cp deploy/nginx-pentacore.conf /etc/nginx/sites-available/pentacore
#   sudo ln -s /etc/nginx/sites-available/pentacore /etc/nginx/sites-enabled/pentacore
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
